# vhost Apache do Bigbag (porta 80). Espelha o padrão do 1417.
# O certbot (--apache) clona isto para *-le-ssl.conf (443) com o certificado
# e acrescenta o redirect http->https aqui. Instalar:
#   sudo cp deploy/apache/bigbag.hal9klabs.com.conf /etc/apache2/sites-available/
#   sudo a2ensite bigbag.hal9klabs.com.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d bigbag.hal9klabs.com
<VirtualHost *:80>
    ServerName bigbag.hal9klabs.com
    DocumentRoot /home/dev/bigbag/frontend/dist
    <Directory /home/dev/bigbag/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Backend Node (porta local própria do Bigbag).
    ProxyPreserveHost On
    ProxyPass        /api/   http://127.0.0.1:4200/api/
    ProxyPassReverse /api/   http://127.0.0.1:4200/api/
    ProxyPass        /health http://127.0.0.1:4200/health
    ProxyPassReverse /health http://127.0.0.1:4200/health

    # SPA fallback: tudo o que não for /api, /health ou ficheiro real → index.html
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/health
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-d
    RewriteRule ^ /index.html [L]

    # PWA: service worker e manifest nunca em cache; assets com hash imutáveis.
    <FilesMatch "(sw\.js|registerSW\.js|manifest\.webmanifest)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>
    <Directory /home/dev/bigbag/frontend/dist/assets>
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    # Áudio curto + foto de fatura cabem de sobra.
    LimitRequestBody 12582912

    ErrorLog ${APACHE_LOG_DIR}/bigbag_error.log
    CustomLog ${APACHE_LOG_DIR}/bigbag_access.log combined
</VirtualHost>
