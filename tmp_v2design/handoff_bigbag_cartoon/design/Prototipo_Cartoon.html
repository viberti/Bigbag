<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BigBag · Protótipo cartoon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="cartoon-ui.css" rel="stylesheet">
<style>
  html,body{margin:0;height:100%}
  body{background:radial-gradient(130% 120% at 50% 0%,#3a5226,#1b2412 70%);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:var(--font)}
  .phone{position:relative;width:390px;height:844px;border-radius:50px;background:#0d160a;padding:11px;border:1px solid #3a4a30;box-shadow:0 40px 90px rgba(0,0,0,.5)}
  .screen{width:100%;height:100%;border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:linear-gradient(180deg,#eef3e2,#e7efd9)}
  .screen>*:not(.bg-motif){position:relative;z-index:1}
  .bg-motif{position:absolute;inset:0;z-index:0;opacity:.5;pointer-events:none}
  .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:116px;height:32px;background:#0d160a;border-radius:20px;z-index:30}
  .hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:#cfe0bd;font:700 12.5px var(--font);background:rgba(20,30,15,.7);border:1px solid #3a4a30;padding:7px 14px;border-radius:999px}

  .stbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 20px 4px;font:700 12px var(--font);color:var(--ink-2);flex:0 0 auto}
  .ctop{display:flex;align-items:center;gap:11px;padding:2px 16px 10px;flex:0 0 auto}
  .ctop .mk{width:38px;height:38px;border-radius:13px;background:var(--leaf-soft);display:grid;place-items:center;flex:0 0 auto}
  .ctop .mk.amber{background:var(--amber-soft)}
  .ctop .hi{flex:1;min-width:0}.ctop .hi b{font:800 19px var(--disp);color:var(--ink);display:block;line-height:1.05}.ctop .hi span{font:600 12.5px/1.3 var(--font);color:var(--ink-2);display:block;max-width:60%}
  .ctop .av{width:40px;height:40px;border-radius:50%;background:var(--leaf-soft);color:var(--leaf-d);display:grid;place-items:center;font:800 16px var(--disp);border:2px solid #fff;cursor:pointer}
  .ctop .bk{height:38px;padding:0 14px 0 9px;border-radius:var(--r-pill);background:var(--card);border:2px solid #fff;color:var(--leaf-d);display:flex;align-items:center;gap:5px;font:800 14px var(--disp);cursor:pointer;box-shadow:var(--sh-sm);flex:0 0 auto}
  .ctop .bk:active{transform:scale(.95)}
  .scrollarea{flex:1;overflow-y:auto;min-height:0;padding:4px 16px 12px}.scrollarea::-webkit-scrollbar{width:0}

  .herolist{background:linear-gradient(160deg,#67b262,#3f7a3f);border-radius:var(--r);padding:18px 20px;color:#f4fff0;box-shadow:var(--sh);position:relative;overflow:hidden;cursor:pointer}
  .herolist .mkbig{position:absolute;right:-12px;bottom:-16px;opacity:.22}
  .herolist .k{font:700 13px var(--font);color:#dcefd2}.herolist .v{font:800 28px var(--disp);margin-top:4px}.herolist .s{font:500 13px var(--font);color:#e6f4dd;margin-top:3px}
  .herolist .go{margin-top:13px;display:inline-flex;align-items:center;gap:7px;background:#fbfdf6;color:var(--leaf-d);font:800 14px var(--disp);border:0;border-radius:var(--r-pill);padding:10px 16px}
  .hero-link{position:absolute;top:16px;right:16px;display:inline-flex;align-items:center;gap:5px;font:800 12px var(--disp);color:#f4fff0;background:rgba(255,255,255,.18);border-radius:var(--r-pill);padding:6px 11px}
  /* análise de gastos */
  .ghero{position:relative;display:flex;align-items:center;gap:12px;background:linear-gradient(160deg,#67b262,#3f7a3f);border-radius:var(--r);padding:16px 18px;color:#f4fff0;box-shadow:var(--sh);margin:2px 0 4px}
  .ghero .gh-l{flex:1}
  .ghero .k{font:700 13px var(--font);color:#dcefd2}.ghero .v{font:800 32px var(--disp);margin-top:2px}
  .ghero .gh-r{display:flex;flex-direction:column;align-items:flex-end;gap:9px;text-align:right}
  .ghero .gchip{display:inline-flex;font:800 12px var(--font);background:rgba(255,255,255,.2);border-radius:var(--r-pill);padding:5px 11px}
  .ghero .gmed{font:600 11.5px var(--font);color:#e3f4dd;line-height:1.25}.ghero .gmed b{font:800 15px var(--disp)}
  .gbars{display:flex;align-items:flex-end;gap:11px;height:150px;padding:20px 6px 4px}
  .gcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
  .gcol .gv{font:800 11px var(--disp);color:var(--ink-2);margin-bottom:4px}
  .gbar{width:100%;background:var(--card);border:2px solid #fff;border-radius:10px 10px 5px 5px;box-shadow:var(--sh-sm);min-height:8px}
  .gbar.on{background:linear-gradient(180deg,#67b262,#3f7a3f);border-color:#3f7a3f}
  .gcol b{font:700 11.5px var(--font);color:var(--ink-3);margin-top:7px}
  .gstore{display:grid;grid-template-columns:1fr auto;gap:5px 8px;margin-bottom:13px;align-items:baseline}
  .gname{font:700 14px var(--font);color:var(--ink)}.gamt{font:800 14px var(--disp);color:var(--leaf-d)}
  .gtrack{grid-column:1/-1;height:11px;border-radius:6px;background:var(--cream-2);overflow:hidden}
  .gfill{height:100%;border-radius:6px}
  .gstat{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:13px 16px;margin:10px 0 2px;box-shadow:var(--sh-sm)}
  .gstat .gk{font:700 13.5px var(--font);color:var(--ink-2)}.gstat b{font:800 19px var(--disp);color:var(--ink)}
  .quick{display:flex;justify-content:space-between;gap:3px;padding:16px 0 4px}
  .quick .round-act{flex:1;min-width:0;gap:6px}
  .quick .round-act b{font-size:10.5px;letter-spacing:-.02em}
  .quick .circ{width:48px;height:48px}
  .cnav .nb{flex:1}
  .cnav .nb .nl,.cnav .nb{font-size:10.5px}
  .clabel-row{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 11px}
  .clabel-row a{font:700 13px var(--font);color:var(--leaf-d);text-decoration:none}
  .seeall{background:var(--leaf-soft);border:1.5px solid var(--leaf);font:800 12.5px var(--disp);color:var(--leaf-d);cursor:pointer;padding:6px 13px;border-radius:999px}
  .seeall:active{transform:scale(.96)}
  /* histórico — seleção p/ comparar */
  .hist-cmp{margin-left:auto;flex:0 0 auto;width:40px;height:40px;border-radius:50%;border:2px solid #fff;background:var(--card);color:var(--leaf-d);display:grid;place-items:center;box-shadow:var(--sh-sm);cursor:pointer}
  .hist-cmp.on{background:var(--leaf);color:#fff;border-color:var(--leaf)}
  .item.hist.sel{border-color:var(--leaf);box-shadow:0 0 0 2px var(--leaf),var(--sh-sm)}
  .item.hist .histcheck{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;margin-right:2px}
  .item.hist .histcheck.on{background:var(--leaf);border-color:var(--leaf)}
  .frow{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:11px 13px;margin-bottom:10px;box-shadow:var(--sh-sm);cursor:pointer}
  .fdot{width:40px;height:40px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;font:800 14px var(--disp);color:#fff}
  .fb{flex:1;min-width:0}.fn{font:700 15px var(--font);color:var(--ink)}.fs{font:500 12px var(--font);color:var(--ink-2);margin-top:1px}.fp{font:800 15px var(--disp);color:var(--leaf-d)}
  .sec{display:flex;align-items:center;gap:9px;font:800 italic 15px var(--disp);color:#2f6b43;letter-spacing:.2px;padding:16px 4px 9px}
  .sec::before{content:"";width:12px;height:12px;background:#e6b34a;border:2px solid #fff;transform:rotate(45deg);box-shadow:var(--sh-sm);flex:0 0 auto}
  .sec::after{content:"";flex:1;height:0;border-top:3px double #d6c79c}
  .sec.amber{color:#9a6a16}
  .sec.amber::before{background:#e0734f}
  .sec.boughtsec{color:var(--ink-3)} .sec.boughtsec::before{background:#c8d3bd}
  .item{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:11px 13px;margin-bottom:9px;box-shadow:var(--sh-sm);cursor:pointer}
  .chk{width:26px;height:26px;border-radius:9px;border:2.5px solid var(--line);flex:0 0 auto;display:grid;place-items:center;color:#fff}
  .item.done .chk{background:var(--leaf);border-color:var(--leaf)}.item.done .iname{text-decoration:line-through;color:var(--ink-3)}
  .ib{flex:1;min-width:0}.iname{font:700 15px var(--font);color:var(--ink)}.isub{font:500 12px var(--font);color:var(--ink-3);margin-top:1px;display:flex;align-items:center;gap:5px}
  .fits{display:inline-flex}
  .profav{width:18px;height:18px;border-radius:50%;color:#fff;font:800 9.5px var(--disp);display:inline-grid;place-items:center;flex:0 0 auto;border:1.5px solid var(--card);margin-left:-6px}
  .profav:first-child{margin-left:0}
  .val{color:var(--amber-d);font-weight:700}
  .actfoot{flex:0 0 auto;padding:10px 16px 14px}
  .scene{height:200px;border-radius:var(--r);overflow:hidden;margin:2px 0 12px;border:2px solid #fff;box-shadow:var(--sh-sm)}.scene svg{width:100%;height:100%;display:block}
  .f-name{font:800 22px var(--disp);color:var(--ink)}.f-brand{font:600 13px var(--font);color:var(--ink-2);margin-top:1px}
  .parecer{background:var(--leaf-soft);border:2px solid #fff;border-radius:var(--r-sm);padding:13px 15px;margin:13px 0;box-shadow:var(--sh-sm)}
  .parecer .ph{display:flex;align-items:center;gap:8px;font:800 15px var(--disp);color:var(--leaf-d)}
  .parecer .selo{font:800 11px var(--font);color:#fff;background:var(--leaf);border-radius:var(--r-pill);padding:3px 10px;margin-left:auto}
  .parecer p{margin:8px 0 0;font:500 13px/1.5 var(--font);color:var(--ink)}
  .nutri{display:flex;gap:6px;margin:6px 0}
  /* ficha rica */
  .f-hero{display:flex;align-items:center;gap:13px;padding:4px 2px 8px}
  .f-thumb{width:60px;height:60px;border-radius:13px;overflow:hidden;flex:0 0 auto;box-shadow:var(--sh-sm)}
  .f-thumb svg{width:100%;height:100%;display:block}
  .f-name{font:800 20px var(--disp);color:var(--ink);line-height:1.1;flex:1}
  .ns-pill{flex:0 0 auto;width:38px;height:52px;border-radius:19px;display:grid;place-items:center;font:700 30px Arial,Helvetica,sans-serif;color:#fff;box-shadow:var(--sh-sm)}
  .parecer.attn{background:#fbf0d6;border:2px solid #fff;box-shadow:0 0 0 2px var(--amber)}
  .parecer .selo.attn{background:var(--amber);color:#3a2606}
  .acc-link{margin-top:10px;background:0;border:0;font:800 13px var(--disp);color:var(--leaf-d);cursor:pointer;padding:0}
  .reguas{background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:13px 14px;box-shadow:var(--sh-sm);margin-bottom:12px}
  .rgrow{display:grid;grid-template-columns:62px 46px 1fr auto;align-items:center;gap:9px;padding:5px 0}
  .rg-l{font:700 13px var(--font);color:var(--ink)}
  .rg-v{font:800 13px var(--disp);color:var(--ink);text-align:right}
  .rg-bar{display:flex;gap:3px}
  .rg-seg{flex:1;height:9px;border-radius:5px}
  .rg-w{font:800 11px var(--font);white-space:nowrap}
  .accbox{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
  .acc{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:13px 15px;font:800 14px var(--disp);color:var(--ink);box-shadow:var(--sh-sm);cursor:pointer}
  .acc svg{transition:.15s;color:var(--leaf-d)}.acc.open svg{transform:rotate(180deg)}
  .acc .acc-count{display:inline-grid;place-items:center;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:var(--leaf-soft);color:var(--leaf-d);font:800 12px var(--disp);margin-left:8px;vertical-align:middle}
  .acc-body{background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:14px 15px;box-shadow:var(--sh-sm);margin-top:-4px}
  .acc-body p{margin:0 0 10px;font:500 13.5px/1.5 var(--font);color:var(--ink)}
  .acc-body.small{font-size:12px}
  .ing-nova{font:600 12.5px var(--font);color:var(--ink-2);background:var(--leaf-soft);border-radius:10px;padding:9px 11px;margin-bottom:12px}
  .ing{border-top:1px solid var(--line);padding:10px 0}
  .ing b{font:700 14.5px var(--font);color:var(--ink)}.ing i{font:600 12px var(--font);color:var(--ink-3);font-style:normal;margin-left:6px}
  .ing p{margin:4px 0 0;font:500 12.5px/1.45 var(--font);color:var(--ink-2)}
  .ing .origem{color:var(--amber-d);font-weight:600}
  .alerg{margin-top:12px;font:700 13px var(--font);color:var(--coral)}.alerg b{color:var(--ink)}
  .chips-why{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 12px}
  .cw{font:600 12px var(--font);color:var(--ink-2);background:var(--cream-2);border-radius:999px;padding:6px 11px}
  .cw.warn{color:var(--amber-d);background:var(--amber-soft)}.cw.good{color:var(--leaf-d);background:var(--leaf-soft)}
  .fontes{font:500 11.5px/1.5 var(--font);color:var(--ink-3);border-top:1px solid var(--line);padding-top:10px}
  .th{padding:8px 0;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .th b{font:700 13px var(--font);color:var(--ink);width:100%;margin-bottom:3px}
  .th .t{font:700 10.5px var(--font);border-radius:999px;padding:3px 8px}
  .th .t.good{color:var(--leaf-d);background:var(--leaf-soft)}.th .t.warn{color:var(--amber-d);background:var(--amber-soft)}.th .t.bad{color:var(--coral);background:var(--coral-soft)}
  .alt-sec{background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:14px 15px;box-shadow:var(--sh-sm);margin-bottom:12px}
  .alt-h{font:800 16px var(--disp);color:var(--ink)}.alt-sub{font:500 12px var(--font);color:var(--ink-2);margin-bottom:10px}
  .alt-sort{display:flex;gap:8px;margin-bottom:6px}
  .altsort{display:inline-flex;align-items:center;gap:5px;font:700 12.5px var(--font);color:var(--ink-2);background:var(--cream-2);border:1.5px solid transparent;border-radius:999px;padding:7px 12px;cursor:pointer}
  .altsort.on{color:var(--leaf-d);background:var(--leaf-soft);border-color:var(--leaf)}
  .altsort svg{color:currentColor}
  .alt,.altx{padding:11px 0;border-top:1px solid var(--line);cursor:pointer}
  .alt-top{display:flex;justify-content:space-between;align-items:baseline}
  .alt-n{font:700 14.5px var(--font);color:var(--ink)}.alt-p{font:800 14px var(--disp);color:var(--leaf-d)}
  .alt-nut{margin-top:3px;font:600 12px var(--font);color:var(--ink-3)}
  .alt-nut .g{color:var(--leaf-d)}.alt-nut .b{color:var(--coral)}
  .alt-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .ap{font:700 11.5px var(--font);border-radius:999px;padding:4px 10px;white-space:nowrap}
  .ap.good{color:var(--leaf-d);background:var(--leaf-soft)}
  .ap.mid{color:var(--ink-2);background:var(--cream-2)}
  .ap.warn{color:var(--amber-d);background:var(--amber-soft)}
  .ap.bad{color:var(--coral);background:var(--coral-soft)}
  .lblphotos{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .lblph{aspect-ratio:1;border-radius:11px;background:linear-gradient(135deg,#dfeaf4,#bcd0e6);border:2px solid #fff}
  .rawdata{font:600 12.5px var(--font);color:var(--ink-3);padding:6px 2px 4px}
  /* recibo (detalhe do talão) */
  .rec-band{display:flex;align-items:center;gap:13px;background:var(--card);border:2px solid #fff;border-radius:var(--r-sm);padding:12px 14px;box-shadow:var(--sh-sm);margin:2px 0 12px}
  .rec-band .fdot{display:grid;place-items:center;color:#fff;flex:0 0 auto}
  .rec-tot{margin-left:auto;font:800 20px var(--disp);color:var(--leaf-d)}
  .rec-item{display:flex;align-items:center;gap:10px;background:var(--card);border:2px solid #fff;border-radius:14px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--sh-sm);cursor:pointer}
  .ri-nm{flex:1;font:700 14.5px var(--font);color:var(--ink)}
  .ri-q{font:600 12px var(--font);color:var(--ink-3)}
  .ri-p{font:800 14px var(--disp);color:var(--ink);min-width:52px;text-align:right}
  .rec-foot{text-align:right;font:700 14px var(--font);color:var(--ink-2);padding:8px 4px}.rec-foot b{font:800 18px var(--disp);color:var(--ink)}
  .ns{flex:1;text-align:center;font:800 14px var(--disp);color:#fff;padding:8px 0;border-radius:12px;opacity:.34}.ns.on{opacity:1;transform:scale(1.07)}
  .ns.a{background:#54b35a}.ns.b{background:#9ec93f}.ns.c{background:#edc63f;color:#5a4a10}.ns.d{background:#ef9f43}.ns.e{background:#e0734f}
  .cmpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:6px}
  .cmpadd{display:flex;flex-direction:column;align-items:center;gap:9px;padding:18px 6px;border-radius:var(--r-sm);background:var(--leaf-soft);border:2px solid #fff;color:var(--leaf-d);cursor:pointer;font:800 13px var(--disp);box-shadow:var(--sh-sm)}
  .selbox{border:2px dashed var(--line);border-radius:var(--r-sm);padding:14px;color:var(--ink-3);text-align:center;font:600 13px var(--font);margin-top:9px}

  /* scanner cartoon */
  .scanmode{display:flex;gap:9px;padding:4px 0 6px}
  /* consulta por texto */
  .txtsearch{display:flex;align-items:center;gap:9px;background:var(--card);border:2px solid #fff;border-radius:var(--r-pill);padding:11px 15px;box-shadow:var(--sh-sm);margin:4px 0 4px}
  .txtsearch .ts-ic{color:var(--leaf-d);flex:0 0 auto}
  .txtsearch .ts-field{flex:1;min-width:0;border:0;background:0;outline:0;font:600 15px var(--font);color:var(--ink)}
  .txtsearch .ts-clear{color:var(--ink-3);flex:0 0 auto;display:grid;place-items:center}
  .smode{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px;border-radius:var(--r-sm);background:var(--card);border:2px solid #fff;color:var(--ink-2);font:700 12px var(--font);box-shadow:var(--sh-sm);cursor:pointer}
  .smode.on{background:var(--leaf-soft);border-color:var(--leaf);color:var(--leaf-d)}
  .sc-cam{flex:1;border-radius:var(--r);background:linear-gradient(180deg,#cfe6e0,#bcd9a6);position:relative;display:grid;place-items:center;margin:6px 0 14px;overflow:hidden;border:2px solid #fff;cursor:pointer}
  .sc-torch{position:absolute;top:11px;right:11px;z-index:3;width:30px;height:30px;border-radius:50%;border:0;background:rgba(20,40,25,.32);color:#fff;display:grid;place-items:center;cursor:pointer}
  .sc-torch.on{background:#f4d06a;color:#5a4410}
  .sc-torch:active{transform:scale(.92)}
  .sc-frame{width:70%;height:42%;position:relative;animation:breath 2.8s ease-in-out infinite}
  .sc-frame::before,.sc-frame::after{content:"";position:absolute;width:30px;height:30px;border:3px solid rgba(255,255,255,.92)}
  .sc-frame::before{top:0;left:0;border-right:0;border-bottom:0;border-radius:14px 0 0 0}
  .sc-frame::after{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 14px 0}
  .sc-frame > i{position:absolute;width:30px;height:30px;border:3px solid rgba(255,255,255,.92)}
  .sc-frame > i.tr{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 14px 0 0}
  .sc-frame > i.bl{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 14px}
  .sc-cam.photo .sc-frame{border:3px solid rgba(255,255,255,.92);border-radius:18px}
  .sc-cam.photo .sc-frame::before,.sc-cam.photo .sc-frame::after{display:none}
  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
  .sc-mk{position:absolute;bottom:12px;left:50%;transform:translateX(-50%)}
  .sc-hint{font:600 13px var(--font);color:var(--ink-2);text-align:center;margin-bottom:12px}
  .ctxpill{align-self:center;font:800 12px var(--font);color:var(--amber-d);background:var(--amber-soft);border-radius:var(--r-pill);padding:6px 13px;display:inline-flex;gap:6px;align-items:center;margin-bottom:4px}
